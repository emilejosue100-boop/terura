# Render Blueprint — Terura backend API
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo
# Or create a Web Service manually with the commands below.

services:
  - type: web
    name: terura-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    # Must use "npm run build" — "npm build" is not a valid npm command
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: GEMINI_MODEL
        sync: false
